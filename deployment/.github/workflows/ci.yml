name: Quant Platform CI

on:

  push:

    branches:
      - main

  pull_request:

    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version:
          - "3.12"

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Lint

        run: |

          pip install ruff

          ruff check .

      - name: Run Tests

        run: |

          pip install pytest

          pytest tests/

      - name: Build Docker

        run: |

          docker build -t quant-platform .