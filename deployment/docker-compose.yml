version: "3.9"

services:

  quant-api:

    build: .

    container_name: quant_api

    restart: always

    ports:
      - "8000:8000"

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    environment:
      ENVIRONMENT: production

    depends_on:
      - postgres
      - redis

  postgres:

    image: postgres:16

    container_name: quant_postgres

    restart: always

    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      POSTGRES_DB: quant_platform

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: quant_redis

    restart: always

    ports:
      - "6379:6379"

  prometheus:

    image: prom/prometheus

    container_name: quant_prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:

    image: grafana/grafana

    container_name: quant_grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:
      - prometheus

volumes:
  postgres_data: