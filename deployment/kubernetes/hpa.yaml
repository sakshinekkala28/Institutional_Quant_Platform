apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:

  name: quant-api

  namespace: quant-platform

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: quant-api

  minReplicas: 3

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70